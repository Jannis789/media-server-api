<main>
  <div class="content">
    <form action="">
      <h2 x-text="$t('login')"></h2>
      <div class="input-box">
        <input type="text" :placeholder="$t('username')" required />
        <i class="ri-user-fill"></i>
      </div>
      <div class="input-box">
        <input
          type="password"
          id="password"
          :placeholder="$t('password')"
          required
          autocomplete="new-password"
        />
        <i class="ri-eye-off-fill toggle-password" id="togglePassword"></i>
      </div>
      <div class="remember">
        <label><input type="checkbox" /><span x-text="$t('remember-me')"></span></label>
        <a href="#" x-text="$t('password-lost')"></a>
      </div>
      <button type="submit" class="btnn" x-text="$t('login')"></button>
      <div class="button">
        <a href="#"> <i class="ri-google-fill"></i> Google </a>--<a href="#">
          <i class="ri-facebook-fill"></i><span x-text="$t('create-account')"></span>
        </a>
      </div>
    </form>
  </div>
</main>
